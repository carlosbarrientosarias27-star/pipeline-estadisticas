name: Pipeline Multi-Etapa Estadísticas
on:
  push:   { branches: [main] }
  pull_request: { branches: [main] }


jobs:
# ─── ETAPA 1: Análisis estático ───────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install flake8
      - name: 🔍 Análisis estático flake8
        run: flake8 src/ --max-line-length=100


# ─── ETAPA 2: Tests unitarios ─────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: 🧪 Tests unitarios con cobertura ≥ 85%
        run: |
          pytest -v --cov=src --cov-fail-under=85

# ─── ETAPA 3: Tests de integración ───────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: 🔗 Tests de integración API Flask
        # Asegúrate de que este archivo también esté en la raíz sin el prefijo tests/
        run: pytest -v


# ─── ETAPA 4: Seguridad con bandit ───────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install bandit
      - name: 🔒 Análisis de seguridad bandit
        run: bandit -r src/ -ll          # -ll: solo errores medium/high

